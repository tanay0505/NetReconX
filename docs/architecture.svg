<svg width="680" height="450" viewBox="0 0 680 450" xmlns="http://www.w3.org/2000/svg" role="img">
<title>How the network reconnaissance tool works</title>
<desc>A five-step flowchart: ARP network scan discovers devices, OS fingerprinting analyzes TTL, TCP port scan runs a threaded connect scan, UDP port scan sends protocol probes, and finally service detection and banner grabbing exports results to JSON.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g>
  <rect x="180" y="30" width="320" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">ARP network scan</text>
  <text x="340" y="70" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">Discover devices (IP + MAC)</text>
</g>
<line x1="340" y1="86" x2="340" y2="116" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="180" y="116" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">OS fingerprinting</text>
  <text x="340" y="156" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">TTL analysis via ICMP ping</text>
</g>
<line x1="340" y1="172" x2="340" y2="202" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="180" y="202" width="320" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="222" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">TCP port scan</text>
  <text x="340" y="242" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">Threaded connect scan</text>
</g>
<line x1="340" y1="258" x2="340" y2="288" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="180" y="288" width="320" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="308" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">UDP port scan</text>
  <text x="340" y="328" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">Protocol-specific probes</text>
</g>
<line x1="340" y1="344" x2="340" y2="374" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
  <rect x="180" y="374" width="320" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="394" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Service detect &amp; banner grab</text>
  <text x="340" y="414" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">Export results to JSON</text>
</g>
</svg>
