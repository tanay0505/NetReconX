<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A six-step pipeline: ARP network scan discovers devices, OS fingerprinting analyzes TTL, then TCP and UDP port scans run in parallel, feeding into service detection and banner grabbing, which feeds a CVE lookup against the NVD API, finally exporting everything to JSON.</desc>
